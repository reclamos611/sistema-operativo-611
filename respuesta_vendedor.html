<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestionar Rechazo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
  .header { background: #c0392b; color: white; padding: 16px 20px; text-align: center; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .step-title { font-size: 13px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: #888; flex-shrink: 0; margin-right: 10px; }
  .info-value { font-weight: 600; color: #1a1a2e; text-align: right; }
  .foto-link { color: #c0392b; text-decoration: none; font-weight: 700; }
  .btn { width: 100%; border: 2px solid #e0e0e0; background: white; border-radius: 10px; padding: 14px; cursor: pointer; font-size: 15px; font-weight: 600; color: #333; transition: all 0.2s; text-align: center; margin-bottom: 8px; display: block; }
  .btn:active { transform: scale(0.97); }
  .btn.selected { border-color: #c0392b; background: #c0392b; color: white; }
  .btn-send { width: 100%; border: none; background: #25D366; color: white; border-radius: 10px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .btn-send:disabled { background: #ccc; cursor: not-allowed; }
  .input { width: 100%; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px; font-size: 14px; outline: none; transition: border 0.2s; margin-top: 10px; }
  .input:focus { border-color: #c0392b; }
  .status { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 10px; }
  .status.ok      { background: #e6f9ee; color: #1a7a3e; }
  .status.err     { background: #fde8e8; color: #c0392b; }
  .status.loading { background: #fff3cd; color: #856404; }
  .id-badge { background: #f0f2f5; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #555; text-align: center; margin-bottom: 12px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ GESTIONAR RECHAZO</h1>
  <p>Respondé al chofer para resolver el rechazo</p>
</div>

<div class="container">

  <div class="card">
    <div class="id-badge" id="id-badge"></div>
    <div class="step-title">Detalle del rechazo</div>
    <div id="info-container"></div>
  </div>

  <div class="card">
    <div class="step-title">Tu respuesta</div>
    <button class="btn" onclick="selectRespuesta(this, 'Me comunico con el cliente ahora')">📞 Me comunico con el cliente ahora</button>
    <button class="btn" onclick="selectRespuesta(this, 'El cliente va a recibir — seguí viaje')">✅ El cliente va a recibir — seguí viaje</button>
    <button class="btn" onclick="selectRespuesta(this, 'Dejá el pedido, lo resuelvo después')">📦 Dejá el pedido, lo resuelvo después</button>
    <button class="btn" onclick="selectRespuesta(this, 'Retirá la mercadería — no se puede entregar')">↩️ Retirá la mercadería</button>
    <textarea class="input" id="obs-extra" placeholder="Observación adicional (opcional)..."></textarea>
  </div>

  <div id="sheets-status" class="status" style="display:none;"></div>

  <button class="btn-send" id="btn-enviar" onclick="enviarRespuesta()" disabled>
    📱 Responder al Chofer por WhatsApp
  </button>

</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwgxUvHpaTwR-qLpt-CpgWQM4vE-xZ2dpm4_Ojc9BRokORGXEo4tmhUIgXgyRmYuwc42w/exec';

const params    = new URLSearchParams(window.location.search);
const rechazoID = params.get('id')       || '';
const choferNom = params.get('chofer')   || '';
const choferCel = params.get('cel')      || '';
const motivo    = params.get('motivo')   || '';
const obs       = params.get('obs')      || '';
const fecha     = params.get('fecha')    || '';
const hora      = params.get('hora')     || '';
const foto      = params.get('foto')     || '';
const vendedor  = params.get('vendedor') || '';

let respuestaSeleccionada = '';

// ID badge
document.getElementById('id-badge').textContent = rechazoID ? '🆔 ID Rechazo: ' + rechazoID : 'Sin ID';

// Info del rechazo
const container = document.getElementById('info-container');
const rows = [
  ['Chofer',  choferNom],
  ['Fecha',   fecha + ' ' + hora],
  ['Motivo',  motivo],
];
if (obs)      rows.push(['Observación', obs]);
if (vendedor) rows.push(['Vendedor',    vendedor]);
rows.forEach(([label, value]) => {
  const div = document.createElement('div');
  div.className = 'info-row';
  div.innerHTML = `<span class="info-label">${label}</span><span class="info-value">${value}</span>`;
  container.appendChild(div);
});
if (foto) {
  const div = document.createElement('div');
  div.className = 'info-row';
  div.innerHTML = `<span class="info-label">Foto</span><span class="info-value"><a class="foto-link" href="${foto}" target="_blank">📸 Ver foto</a></span>`;
  container.appendChild(div);
}

function selectRespuesta(btn, texto) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  respuestaSeleccionada = texto;
  document.getElementById('btn-enviar').disabled = false;
}

function enviarRespuesta() {
  const obsExtra    = document.getElementById('obs-extra').value;
  const respFinal   = respuestaSeleccionada + (obsExtra ? ' — ' + obsExtra : '');

  // 1. Guardar respuesta en Sheets
  guardarRespuestaSheets(respFinal);

  // 2. Abrir WhatsApp al chofer
  const msg = `✅ *RESPUESTA AL RECHAZO*\n\n` +
    `🆔 ID: ${rechazoID}\n` +
    `👔 Vendedor: ${vendedor}\n` +
    `📋 Motivo: ${motivo}\n\n` +
    `💬 *Respuesta:* ${respFinal}\n\n` +
    `_Gestionado en este momento._`;

  window.open('https://wa.me/54' + choferCel + '?text=' + encodeURIComponent(msg), '_blank');
}

function guardarRespuestaSheets(respuesta) {
  const statusEl = document.getElementById('sheets-status');
  statusEl.style.display = 'block';
  statusEl.className = 'status loading';
  statusEl.textContent = '⏳ Guardando respuesta en planilla...';

  const p = new URLSearchParams({
    accion:    'responder',
    id:        rechazoID,
    respuesta: respuesta
  });

  const img = new Image();
  img.onload = img.onerror = () => {
    statusEl.className = 'status ok';
    statusEl.textContent = '✓ Respuesta guardada en planilla';
  };
  img.src = SHEETS_URL + '?' + p.toString();
}
</script>
</body>
</html>
