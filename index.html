<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>611 Logistica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0c10;color:#e8ecf8;font-family:'Segoe UI',system-ui,sans-serif;
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:420px;}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{display:inline-flex;align-items:center;justify-content:center;
           width:72px;height:72px;border-radius:20px;
           background:linear-gradient(135deg,#0e2244,#1a3a6e);
           border:1.5px solid #4d8ef0;font-size:32px;margin-bottom:14px;}
.logo-name{font-size:1.5rem;font-weight:800;}
.logo-sub{font-size:.78rem;color:#555f78;margin-top:4px;
          text-transform:uppercase;letter-spacing:.1em;}
.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:22px;}
.rtab{padding:10px 6px;border-radius:10px;border:1.5px solid #2a2f3e;
      background:#13161e;color:#8b93a8;font-size:.76rem;font-weight:700;
      cursor:pointer;text-align:center;transition:all .18s;line-height:1.4;}
.rtab .rim{font-size:1.3rem;display:block;margin-bottom:4px;}
.rtab:hover{border-color:#4d8ef0;color:#e8ecf8;}
.rtab.on{background:#0e1a3a;border-color:#4d8ef0;color:#a8c4fb;}
.rtab.on.rc {background:#0a2e1c;border-color:#22c55e;color:#4ade80;}
.rtab.on.rv {background:#0e1a3a;border-color:#3b82f6;color:#93c5fd;}
.rtab.on.rsv{background:#2a1a00;border-color:#f59e0b;color:#fcd34d;}
.rtab.on.rsd{background:#1e1244;border-color:#8b5cf6;color:#c4b5fd;}
.rtab.on.rg {background:#2a0808;border-color:#ef4444;color:#fca5a5;}
.form-box{background:#13161e;border:1.5px solid #2a2f3e;border-radius:16px;padding:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:.7rem;color:#555f78;font-weight:700;
             text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.field input{width:100%;background:#1a1e28;border:1.5px solid #2a2f3e;
             border-radius:10px;color:#e8ecf8;padding:12px 14px;
             font-size:.95rem;outline:none;transition:border .15s;}
.field input:focus{border-color:#4d8ef0;}
.btn-login{width:100%;padding:13px;border:none;border-radius:10px;color:white;
           font-size:.95rem;font-weight:700;cursor:pointer;margin-top:4px;
           transition:opacity .15s;}
.btn-login:hover{opacity:.88;}
.btn-c  {background:linear-gradient(135deg,#2ecc8a,#1fa870);}
.btn-v  {background:linear-gradient(135deg,#4d8ef0,#2a6ecf);}
.btn-sv {background:linear-gradient(135deg,#f0a500,#c97f00);}
.btn-sd {background:linear-gradient(135deg,#a07cf0,#7040d0);}
.btn-g  {background:linear-gradient(135deg,#ef4444,#c03030);}
.err{display:none;color:#f8a0a0;font-size:.8rem;background:#2e0808;
     border:1px solid #f04d4d;border-radius:8px;padding:9px 13px;
     margin-bottom:14px;text-align:center;}
.hint-box{margin-top:18px;background:#1a1e28;border:1px solid #2a2f3e;
          border-radius:10px;padding:13px 15px;}
.hint-box .h-title{font-size:.7rem;color:#555f78;font-weight:700;
                   text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.hint-box .h-row{display:flex;justify-content:space-between;padding:5px 0;
                 border-bottom:1px solid #2a2f3e;font-size:.76rem;}
.hint-box .h-row:last-child{border-bottom:none;}
.hint-box .h-dest{color:#555f78;font-size:.72rem;}
.redirect{display:none;position:fixed;inset:0;background:#0a0c10;
          align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;}
.redirect.show{display:flex;}
.rd-icon{font-size:3rem;animation:bounce .6s infinite alternate;}
.rd-msg{font-size:1rem;font-weight:700;}
.rd-sub{font-size:.8rem;color:#555f78;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}

/* IFRAME APP SHELL */
.app-frame { display:none; position:fixed; inset:0; z-index:100; flex-direction:column; background:#0a0c10; }
.app-frame.show { display:flex; }
.app-topbar { display:flex; align-items:center; gap:12px; padding:8px 16px;
              background:#13161e; border-bottom:1px solid #2a2f3e;
              flex-shrink:0; z-index:101; }
.app-topbar .app-user { font-size:.82rem; font-weight:700; color:#e8ecf8; }
.app-topbar .app-role { font-size:.72rem; color:#555f78; margin-left:4px; }
.app-topbar .logo-sm { font-size:1.1rem; margin-right:4px; }
.app-topbar .btn-back { margin-left:auto; background:none; border:1px solid #2a2f3e;
                        border-radius:7px; color:#94a3b8; padding:5px 14px;
                        font-size:.78rem; cursor:pointer; font-family:inherit; }
.app-topbar .btn-back:hover { border-color:#6366f1; color:#e8ecf8; }
.app-iframe { flex:1; border:none; width:100%; height:100%; }
</style>
</head>
<body>

<!-- APP FRAME -->
<div class="app-frame" id="app-frame">
  <div class="app-topbar">
    <span class="logo-sm">&#128230;</span>
    <span class="app-user" id="frame-user">-</span>
    <span class="app-role" id="frame-role"></span>
    <button class="btn-back" onclick="closeFrame()">&#8592; Salir al inicio</button>
  </div>
  <iframe class="app-iframe" id="app-iframe" src="" title="App 611"></iframe>
</div>

<div class="redirect" id="rd">
  <div class="rd-icon" id="rd-icon">&#128230;</div>
  <div class="rd-msg" id="rd-msg">Accediendo...</div>
  <div class="rd-sub" id="rd-sub">Preparando tu espacio</div>
</div>

<div class="wrap">
  <div class="logo-area">
    <div class="logo-icon">&#128230;</div>
    <div class="logo-name">611 Logistica</div>
    <div class="logo-sub">Sistema de Gestion Integral</div>
  </div>

  <div class="role-tabs">
    <div class="rtab rc on" id="rt-chofer"   onclick="setRole('chofer')">
      <span class="rim">&#128666;</span>Chofer</div>
    <div class="rtab rv"    id="rt-vendedor" onclick="setRole('vendedor')">
      <span class="rim">&#128101;</span>Vendedor</div>
    <div class="rtab rsv"   id="rt-supventa" onclick="setRole('supventa')">
      <span class="rim">&#128202;</span>Sup. Venta</div>
    <div class="rtab rsd"   id="rt-supdepo"  onclick="setRole('supdepo')">
      <span class="rim">&#127981;</span>Sup. Depo</div>
    <div class="rtab rg"    id="rt-gerente"  onclick="setRole('gerente')">
      <span class="rim">&#127381;</span>Gerente</div>
  </div>

  <div class="form-box">
    <div class="err" id="err"></div>
    <div class="field">
      <label id="lbl-user">Codigo de Chofer</label>
      <input id="inp-user" type="text" placeholder="Ej: C1"
             autocomplete="username" oninput="clearErr()">
    </div>
    <div class="field">
      <label>Contrasena</label>
      <input id="inp-pass" type="password" placeholder="&bull;&bull;&bull;&bull;"
             autocomplete="current-password"
             oninput="clearErr()"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login btn-c" id="btn-login" onclick="doLogin()">Ingresar</button>
  </div>

  <div class="hint-box">
    <div class="h-title">Destino por rol</div>
    <div class="h-row">
      <span>&#128666; Chofer</span>
      <span class="h-dest">App de Rechazos</span>
    </div>
    <div class="h-row">
      <span>&#128101; Vendedor</span>
      <span class="h-dest">Guia de Visita</span>
    </div>
    <div class="h-row">
      <span>&#128202; Sup. Venta</span>
      <span class="h-dest">MAS Analytics</span>
    </div>
    <div class="h-row">
      <span>&#127981; Sup. Deposito</span>
      <span class="h-dest">Dashboard Operativo</span>
    </div>
    <div class="h-row">
      <span>&#127381; Gerente</span>
      <span class="h-dest">Dashboard + Analytics</span>
    </div>
  </div>
</div>

<script>
var SESSION_KEY = '611_login';
var currentRole = 'chofer';

// -- URLs de cada app ----------------------------------------------------------
var APPS = {
  chofer:   'https://reclamos611.github.io/rechazos-app/reporte_rechazo.html',
  vendedor: 'https://reclamos611.github.io/guia-vendedores/guia_visita_611.html',
  supventa: 'https://reclamos611.github.io/guia-vendedores/mas_analytics_v9.html',
  supdepo:  'https://reclamos611.github.io/sistema-operativo-611/dashboard_operativo.html',
  gerente:  'https://reclamos611.github.io/sistema-operativo-611/dashboard_operativo.html'
};

// -- Usuarios ------------------------------------------------------------------
var USERS = {
  'GER':   {name:'Gerente',          role:'gerente',  pass:'ger611'},
  'SUPV1': {name:'Claudio Alvarado', role:'supventa', pass:'sup611'},
  'SUPV2': {name:'Natalia Perez',    role:'supventa', pass:'nat611'},
  'SUPV3': {name:'Sebastian',        role:'supventa', pass:'seb611'},
  'SUPD1': {name:'Federico Perez',   role:'supdepo',  pass:'supd611'}
};
(function(){
  var codes=['C1','C2','C3','C4','C5','C6','C7','C8','C9','C10','C11',
             'C251','C252','C253','C254','C255','C256','C257','C258',
             'C259','C260','C261','C262'];
  var names=['GUZMAN DIEGO','CARO MAXIMILIANO','RICAPA JOSE','AVALOS RODRIGO',
             'OYOLA GASTON','LUJAN LUCAS','JUAREZ LUIS','MOLINA JORGE',
             'RAFAELLI DIEGO','SUAREZ TOBIAS','MARTINEZ LEANDRO',
             'GONZALEZ CECILIA','BELEN AGUSTIN','GUIRAO LUIS','JUNCOS EZEQUIEL',
             'ROMANO RODRIGO','IRIARTE MAURO','CANELO PABLO','NIETO GUSTAVO',
             'GUEVARA ENRIQUE','PALLOTTI DUILIO','ROMANO MARTIN','TALAVERA ADRIAN'];
  codes.forEach(function(c,i){
    USERS[c]={name:names[i]||c, role:'chofer', pass:(c+c).toLowerCase()};
  });
  [31,32,33,34,35,36,37,38,39,41,42,43,44,45,46,47,48,49,
   51,52,53,54,55,56,57,58,59].forEach(function(n){
    USERS['V'+n]={name:'Vendedor '+n, role:'vendedor', vendedorNum:n,
                  pass:String(n)+String(n)};
  });
})();

// -- Config por rol ------------------------------------------------------------
var ROLE_CFG = {
  chofer:   {lbl:'Codigo de Chofer',   ph:'Ej: C1',    btn:'btn-c'},
  vendedor: {lbl:'Numero de Vendedor', ph:'Ej: 31',    btn:'btn-v'},
  supventa: {lbl:'Usuario',            ph:'Ej: SUPV1', btn:'btn-sv'},
  supdepo:  {lbl:'Usuario',            ph:'SUPD1',     btn:'btn-sd'},
  gerente:  {lbl:'Usuario',            ph:'GER',       btn:'btn-g'}
};

var REDIRECT_CFG = {
  chofer:   {icon:'&#128666;', msg:'Abriendo app de rechazos...',    sub:''},
  vendedor: {icon:'&#128101;', msg:'Cargando guia de visita...',     sub:''},
  supventa: {icon:'&#128202;', msg:'Abriendo MAS Analytics...',      sub:''},
  supdepo:  {icon:'&#127981;', msg:'Abriendo dashboard operativo...', sub:''},
  gerente:  {icon:'&#127381;', msg:'Acceso total...',                sub:''}
};

function setRole(r) {
  currentRole = r;
  ['chofer','vendedor','supventa','supdepo','gerente'].forEach(function(x){
    document.getElementById('rt-'+x).classList.toggle('on', x===r);
  });
  var cfg = ROLE_CFG[r];
  document.getElementById('lbl-user').textContent = cfg.lbl;
  document.getElementById('inp-user').placeholder  = cfg.ph;
  document.getElementById('btn-login').className   = 'btn-login ' + cfg.btn;
  clearErr();
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
}

function clearErr() {
  document.getElementById('err').style.display = 'none';
}
function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  var user = document.getElementById('inp-user').value.trim().toUpperCase();
  var pass = document.getElementById('inp-pass').value.trim();
  if (!user || !pass) { showErr('Ingresa usuario y contrasena.'); return; }

  var u = USERS[user];
  // Vendedor puede tipear "31" o "V31"
  if (!u && currentRole === 'vendedor') {
    u = USERS['V' + user];
    if (u) user = 'V' + user;
  }
  if (!u || u.pass !== pass) {
    showErr('Usuario o contrasena incorrectos.');
    document.getElementById('inp-pass').value = '';
    return;
  }
  if (u.role !== currentRole) {
    showErr('Ese usuario no corresponde al rol seleccionado.');
    document.getElementById('inp-pass').value = '';
    return;
  }

  // Guardar sesion en localStorage (cada app la puede leer)
  var session = {user:user, name:u.name, role:u.role,
                 vendedorNum:u.vendedorNum||null, ts:Date.now()};
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch(e){}

  // Pre-fill sessions para cada app destino
  if (u.role === 'chofer') {
    try { localStorage.setItem('chofer611', JSON.stringify({
      id:session.user, nombre:session.name, codigo:session.user
    })); } catch(e){}
  }
  if (u.role === 'vendedor') {
    try { localStorage.setItem('611_guia_vendedor', JSON.stringify({
      num:u.vendedorNum, nombre:u.name, ts:session.ts
    })); } catch(e){}
  }
  if (u.role === 'supventa' || u.role === 'gerente') {
    try { localStorage.setItem('611_analytics_session', JSON.stringify({
      user:session.user, name:session.name, role:session.role, ts:session.ts
    })); } catch(e){}
  }

  redirect(session);
}

function redirect(session) {
  var cfg = REDIRECT_CFG[session.role];
  document.getElementById('rd-icon').innerHTML = cfg.icon;
  document.getElementById('rd-msg').textContent = cfg.msg;
  document.getElementById('rd-sub').textContent = cfg.sub;
  document.getElementById('rd').classList.add('show');

  var dest = APPS[session.role];
  if (session.role === 'gerente') dest += '?rol=gerente';

  setTimeout(function() {
    // Open in iframe instead of navigating away
    document.getElementById('rd').classList.remove('show');
    document.getElementById('frame-user').textContent = session.name;
    document.getElementById('frame-role').textContent = '(' + session.role + ')';
    document.getElementById('app-iframe').src = dest;
    document.getElementById('app-frame').classList.add('show');
    // Hide login wrap
    document.querySelector('.wrap').style.display = 'none';
  }, 600);
}

function closeFrame() {
  // Clear session and return to login
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  try { localStorage.removeItem('chofer611'); } catch(e) {}
  try { localStorage.removeItem('611_guia_vendedor'); } catch(e) {}
  try { localStorage.removeItem('611_analytics_session'); } catch(e) {}
  // Reset iframe
  document.getElementById('app-iframe').src = '';
  document.getElementById('app-frame').classList.remove('show');
  // Show login
  document.querySelector('.wrap').style.display = '';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  clearErr();
  setRole('chofer');
}

// -- Auto-login si hay sesion vigente (12 horas) -------------------------------
(function(){
  try {
    var raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    var s = JSON.parse(raw);
    if (s && s.ts && (Date.now()-s.ts) < 43200000 && USERS[s.user]) {
      redirect(s);
    }
  } catch(e) {}
})();
</script>
</body>
</html>
